<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>The Epicurean House — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
<style>
:root {
  --cream: #FDF8F0;
  --ivory: #FAF5EB;
  --warm-white: #FFFDF9;
  --chocolate: #3B2314;
  --chocolate-light: #5C3A24;
  --copper: #B87333;
  --copper-light: #D4956A;
  --copper-glow: #E8A96840;
  --gold: #C9A96E;
  --gold-light: #E0C992;
  --sage: #7A9E7E;
  --sage-light: #A8C5AB;
  --wine-red: #8B2252;
  --charcoal: #2C2C2C;
  --text-primary: #2C1810;
  --text-secondary: #6B5B50;
  --text-muted: #9B8B80;
  --border: #E8DFD4;
  --shadow-sm: 0 1px 3px rgba(59,35,20,0.08);
  --shadow-md: 0 4px 12px rgba(59,35,20,0.12);
  --shadow-lg: 0 8px 32px rgba(59,35,20,0.16);
  --radius: 12px;
  --radius-lg: 20px;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
}

* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }
body { font-family:var(--font-body); color:var(--text-primary); background:var(--cream); -webkit-font-smoothing:antialiased; }

.screen { display:none; height:100vh; overflow:hidden; }
.screen.active { display:flex; flex-direction:column; }

/* SETUP SCREEN */
#setup {
  background: linear-gradient(135deg, var(--chocolate) 0%, var(--chocolate-light) 100%);
  align-items:center; justify-content:center; text-align:center; color:var(--cream); padding:2rem;
}
#setup h1 { font-family:var(--font-display); font-size:2.4rem; font-weight:600; letter-spacing:0.02em; margin-bottom:0.3rem; }
#setup .subtitle { font-size:1rem; color:var(--copper-light); font-weight:300; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:1.5rem; }
#setup .divider { width:80px; height:1px; background:var(--copper); margin:1.5rem auto; opacity:0.6; }
.lang-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:1rem; max-width:320px; width:100%; margin-bottom:2rem; }
.lang-card {
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
  border-radius:var(--radius-lg); padding:1.2rem; cursor:pointer;
  transition:all 0.2s var(--ease-out); text-align:center;
}
.lang-card:hover { background:rgba(255,255,255,0.1); transform:translateY(-2px); }
.lang-card.selected { border-color:var(--copper); background:rgba(184,115,51,0.15); }
.lang-card h3 { font-family:var(--font-display); font-size:1.1rem; margin-bottom:0.2rem; }
.lang-card p { font-size:0.75rem; color:var(--copper-light); }

.setup-form { max-width:320px; width:100%; }
.setup-form select {
  width:100%; padding:0.8rem; border-radius:var(--radius);
  border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08);
  color:var(--cream); font-size:0.9rem; margin-bottom:1rem;
}
.setup-form select option { color:#333; }
.btn-open {
  width:100%; padding:1rem; border:none; border-radius:var(--radius);
  background:var(--copper); color:#fff; font-size:1rem; font-weight:600;
  cursor:pointer; transition:all 0.16s var(--ease-out);
}
.btn-open:active { transform:scale(0.97); }

/* MENU SCREEN */
#menu { background:var(--cream); }
.menu-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:1rem 1.5rem; background:var(--warm-white);
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.menu-header .brand { font-family:var(--font-display); font-size:1.1rem; color:var(--chocolate); font-weight:600; }
.menu-header .table-badge {
  background:var(--copper); color:#fff; font-size:0.75rem; font-weight:600;
  padding:0.3rem 0.8rem; border-radius:20px;
}
.call-server-btn {
  background:var(--wine-red); color:#fff; border:none; border-radius:30px;
  padding:0.6rem 1.2rem; font-size:0.85rem; font-weight:500; cursor:pointer;
  display:flex; align-items:center; gap:0.4rem;
  transition:all 0.16s var(--ease-out); animation:pulse-ring 2s infinite;
}
.call-server-btn:active { transform:scale(0.95); }
@keyframes pulse-ring { 0%,100%{box-shadow:0 0 0 0 rgba(139,34,82,0.4)} 50%{box-shadow:0 0 0 8px rgba(139,34,82,0)} }

.menu-tabs {
  display:flex; gap:0; overflow-x:auto; padding:0 1rem;
  background:var(--warm-white); border-bottom:1px solid var(--border); flex-shrink:0;
  scrollbar-width:none;
}
.menu-tabs::-webkit-scrollbar { display:none; }
.menu-tab {
  padding:0.8rem 1.2rem; font-size:0.8rem; font-weight:500; white-space:nowrap;
  color:var(--text-muted); border-bottom:2px solid transparent; cursor:pointer;
  transition:all 0.2s var(--ease-out);
}
.menu-tab.active { color:var(--copper); border-bottom-color:var(--copper); }

.menu-content { flex:1; overflow-y:auto; padding:1.5rem; }
.menu-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1.2rem; }

.dish-card {
  background:var(--warm-white); border:1px solid var(--border); border-radius:var(--radius);
  padding:1.2rem; transition:all 0.2s var(--ease-out); cursor:pointer;
}
.dish-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
.dish-card .dish-name { font-family:var(--font-display); font-size:1.05rem; font-weight:600; margin-bottom:0.3rem; }
.dish-card .dish-desc { font-size:0.82rem; color:var(--text-secondary); line-height:1.5; margin-bottom:0.6rem; }
.dish-card .dish-meta { display:flex; align-items:center; justify-content:space-between; }
.dish-card .dish-price { font-weight:600; color:var(--copper); font-size:1rem; }
.dish-card .dish-tags { display:flex; gap:0.3rem; flex-wrap:wrap; }
.dish-tag {
  font-size:0.65rem; padding:0.15rem 0.5rem; border-radius:10px;
  background:var(--sage-light); color:#fff; font-weight:500;
}
.dish-tag.allergen { background:#f87171; }

.menu-footer {
  display:flex; align-items:center; justify-content:space-between;
  padding:0.8rem 1.5rem; background:var(--warm-white); border-top:1px solid var(--border); flex-shrink:0;
}
.lang-selector { display:flex; gap:0.5rem; }
.lang-btn {
  width:32px; height:32px; border-radius:50%; border:1px solid var(--border);
  background:var(--warm-white); font-size:0.7rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.16s var(--ease-out);
}
.lang-btn.active { border-color:var(--copper); background:var(--copper-glow); }

/* Dish detail modal */
.modal-overlay {
  position:fixed; inset:0; background:rgba(44,24,16,0.5); backdrop-filter:blur(4px);
  display:none; align-items:center; justify-content:center; z-index:1000; padding:1.5rem;
}
.modal-overlay.open { display:flex; }
.modal-card {
  background:var(--warm-white); border-radius:var(--radius-lg); padding:2rem;
  max-width:500px; width:100%; max-height:80vh; overflow-y:auto;
  box-shadow:var(--shadow-lg); position:relative;
}
.modal-card h2 { font-family:var(--font-display); font-size:1.4rem; margin-bottom:0.5rem; }
.modifier-group { margin-top:1rem; }
.modifier-group h4 { font-size:0.8rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); margin-bottom:0.5rem; }
.modifier-option {
  display:flex; align-items:center; gap:0.6rem; padding:0.5rem 0;
  border-bottom:1px solid var(--border); cursor:pointer;
}
.modifier-option input { accent-color:var(--copper); }

/* Toast */
.toast {
  position:fixed; top:1rem; left:50%; transform:translateX(-50%) translateY(-100%);
  background:var(--chocolate); color:var(--cream); padding:0.8rem 1.5rem;
  border-radius:var(--radius); font-size:0.85rem; font-weight:500;
  box-shadow:var(--shadow-lg); z-index:9999; opacity:0;
  transition:all 0.3s var(--ease-out);
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* Message notification */
.msg-notification {
  position:fixed; bottom:5rem; left:50%; transform:translateX(-50%);
  background:var(--chocolate); color:var(--cream); padding:0.8rem 1.5rem;
  border-radius:var(--radius); font-size:0.85rem; box-shadow:var(--shadow-lg);
  z-index:999; display:none; max-width:80%;
}
.msg-notification.show { display:block; animation:slideUp 0.3s var(--ease-out); }
@keyframes slideUp { from{opacity:0;transform:translateX(-50%) translateY(20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* Responsive */
@media (max-width:768px) { .menu-grid { grid-template-columns:1fr; } }
@media (min-width:1024px) { .menu-grid { grid-template-columns:repeat(3,1fr); } }
</style>
</head>
<body>

<div id="toast" class="toast"></div>
<div id="msg-notification" class="msg-notification"></div>

<!-- SETUP SCREEN -->
<div id="setup" class="screen active">
  <h1 style="font-family:var(--font-display);">The Epicurean House</h1>
  <p class="subtitle">@ The Chocolate Studio</p>
  <div class="divider"></div>
  <p style="color:var(--copper-light);margin-bottom:2rem;font-size:0.9rem;">Select your language</p>
  <div class="lang-grid">
    <div class="lang-card selected" onclick="setLang('en',this)"><h3>English</h3><p>English</p></div>
    <div class="lang-card" onclick="setLang('es',this)"><h3>Español</h3><p>Spanish</p></div>
    <div class="lang-card" onclick="setLang('fr',this)"><h3>Français</h3><p>French</p></div>
    <div class="lang-card" onclick="setLang('ja',this)"><h3>日本語</h3><p>Japanese</p></div>
  </div>
  <div class="setup-form">
    <select id="setup-table"><option value="">Select table…</option></select>
    <button class="btn-open" onclick="openMenu()">Open Menu →</button>
  </div>
</div>

<!-- MENU SCREEN -->
<div id="menu" class="screen">
  <div class="menu-header">
    <span class="brand">The Epicurean House</span>
    <span class="table-badge" id="menu-table-badge">Table 1</span>
    <button class="call-server-btn" onclick="callServer()">🔔 Call Server</button>
  </div>
  <div class="menu-tabs" id="menu-tabs"></div>
  <div class="menu-content" id="menu-content"></div>
  <div class="menu-footer">
    <div class="lang-selector">
      <button class="lang-btn active" data-lang="en" onclick="switchLang('en')">EN</button>
      <button class="lang-btn" data-lang="es" onclick="switchLang('es')">ES</button>
      <button class="lang-btn" data-lang="fr" onclick="switchLang('fr')">FR</button>
      <button class="lang-btn" data-lang="ja" onclick="switchLang('ja')">JA</button>
    </div>
    <div id="menu-msg-area" style="font-size:0.8rem;color:var(--text-muted);max-width:60%;text-align:right;"></div>
  </div>
</div>

<!-- DISH DETAIL MODAL -->
<div class="modal-overlay" id="dish-modal">
  <div class="modal-card" id="dish-modal-content"></div>
</div>

<script>
// ─── Firebase ───────────────────────────────────────────────────
var firebaseConfig = {
  apiKey: "AIzaSyAvg9x8kmKmZjcu62D2Jb4jpO57ArC657Y",
  authDomain: "epicurean-house-at-the-choc-st.firebaseapp.com",
  projectId: "epicurean-house-at-the-choc-st",
  storageBucket: "epicurean-house-at-the-choc-st.firebasestorage.app",
  messagingSenderId: "320703681087",
  appId: "1:320703681087:web:04f7c9a17637388a039e8a"
};
var fbApp=null, fbDb=null, fbReady=false;
try { fbApp=firebase.initializeApp(firebaseConfig); fbDb=firebase.firestore(); fbReady=true; } catch(e){ console.warn('Firebase init:',e); }

// ─── State ──────────────────────────────────────────────────────
var STATE = { lang:'en', tableNum:1, menuItems:[], menuCategories:[], messages:[] };

var SEED_CATEGORIES = [
  {id:'small-plates',name:'Small Plates',visible:true},
  {id:'ceviche',name:'Ceviche',visible:true},
  {id:'soups-salads',name:'Soups & Salads',visible:true},
  {id:'entrees',name:'Entrées',visible:true},
  {id:'sides',name:'Sides',visible:true},
  {id:'desserts',name:'Desserts',visible:true},
  {id:'kids',name:'Kids',visible:true},
  {id:'brunch',name:'Brunch',visible:true},
  {id:'cocktails',name:'Cocktails',visible:true},
  {id:'beer',name:'Beer',visible:true},
  {id:'spirits',name:'Spirits',visible:true},
  {id:'wine',name:'Wine',visible:true}
];

var SEED_ITEMS = [
  {id:'i1',code:'SP01',name:'Tuna Tartare',desc:'Ahi tuna, avocado mousse, sesame crisp, ponzu',price:16,cost:5.5,category:'small-plates',station:'Cold/Garde Manger',cookTime:8,allergens:['Fish','Soy','Sesame'],dietary:['GF','DF','Nut-Free'],modifiers:[]},
  {id:'i2',code:'CE01',name:'Peruvian Ceviche',desc:'Fresh corvina, leche de tigre, red onion, sweet potato, cancha',price:18,cost:6.5,category:'ceviche',station:'Cold/Garde Manger',cookTime:5,allergens:['Fish'],dietary:['GF','DF','Nut-Free','Shellfish-Free'],modifiers:[]},
  {id:'i3',code:'CE02',name:'Shrimp Ceviche',desc:'Gulf shrimp, mango, habanero, coconut milk',price:19,cost:7,category:'ceviche',station:'Cold/Garde Manger',cookTime:5,allergens:['Shellfish'],dietary:['GF','DF','Nut-Free'],modifiers:[]},
  {id:'i4',code:'EN01',name:'Wagyu Ribeye',desc:'12oz prime wagyu, chimichurri, roasted garlic, seasonal vegetables',price:58,cost:22,category:'entrees',station:'Grill',cookTime:18,allergens:[],dietary:['GF','DF','Nut-Free','Shellfish-Free'],modifiers:[{group:'Temperature',options:['R','MR','M']}]},
  {id:'i5',code:'EN02',name:'Pan-Seared Salmon',desc:'Atlantic salmon, lemon beurre blanc, asparagus, fingerling potatoes',price:34,cost:12,category:'entrees',station:'Sauté',cookTime:14,allergens:['Fish','Dairy'],dietary:['GF','Nut-Free','Shellfish-Free'],modifiers:[{group:'Temperature',options:['MR','M']}]},
  {id:'i6',code:'DE01',name:'Chocolate Studio Torte',desc:'Dark chocolate ganache, raspberry coulis, gold leaf, house ice cream',price:14,cost:3.5,category:'desserts',station:'Pastry',cookTime:3,allergens:['Dairy','Egg','Soy'],dietary:['Vegetarian','Nut-Free','Shellfish-Free'],modifiers:[]},
  {id:'i7',code:'DE02',name:'Crème Brûlée',desc:'Madagascar vanilla bean, caramelized sugar, seasonal berries',price:12,cost:2.8,category:'desserts',station:'Pastry',cookTime:2,allergens:['Dairy','Egg'],dietary:['GF','Vegetarian','Nut-Free','Shellfish-Free'],modifiers:[]},
  {id:'i8',code:'CK01',name:'Pisco Sour',desc:'Pisco, lime, egg white, Angostura bitters',price:14,cost:4,category:'cocktails',station:'Bar',cookTime:3,allergens:['Egg'],dietary:['GF','DF','Nut-Free'],modifiers:[]},
  {id:'i9',code:'CK02',name:'Chocolate Old Fashioned',desc:'Bourbon, cacao nib syrup, orange, Angostura',price:16,cost:5,category:'cocktails',station:'Bar',cookTime:3,allergens:[],dietary:['GF','DF','Nut-Free','Vegan'],modifiers:[]},
  {id:'i10',code:'BE01',name:'Local Lager',desc:'Crisp craft lager, 16oz draft',price:8,cost:2.5,category:'beer',station:'Bar',cookTime:1,allergens:['Gluten'],dietary:['DF','Nut-Free','Vegetarian'],modifiers:[]},
  {id:'i11',code:'WN01',name:'Malbec Reserva',desc:'Bodega Andes, 2021, Mendoza — rich dark fruit, velvety tannins',price:52,cost:18,category:'wine',station:'Bar',cookTime:1,allergens:['Sulfites'],dietary:['GF','DF','Nut-Free','Vegan'],modifiers:[{group:'Pour',options:['Glass $14','Bottle $52']}]},
  {id:'i12',code:'WN02',name:'Chardonnay',desc:'Casa Blanca, 2022, Casablanca — tropical fruit, balanced oak',price:44,cost:15,category:'wine',station:'Bar',cookTime:1,allergens:['Sulfites'],dietary:['GF','DF','Nut-Free','Vegan'],modifiers:[{group:'Pour',options:['Glass $12','Bottle $44']}]},
  {id:'i13',code:'SS01',name:'Soup of the Day',desc:"Chef's seasonal creation — ask your server",price:10,cost:2.5,category:'soups-salads',station:'Sauté',cookTime:5,allergens:[],dietary:[],modifiers:[]},
  {id:'i14',code:'SD01',name:'Truffle Fries',desc:'Hand-cut fries, truffle oil, parmesan, herbs',price:12,cost:3,category:'sides',station:'Fry',cookTime:6,allergens:['Dairy'],dietary:['Vegetarian','GF','Nut-Free','Shellfish-Free'],modifiers:[]}
];

// ─── Helpers ────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function toast(msg, duration) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration||3000);
}
function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ─── Firebase load ──────────────────────────────────────────────
function loadFromFirebase() {
  if (!fbReady) { useSeedData(); return; }
  fbDb.collection('config').doc('menu_categories').get().then(doc => {
    if (doc.exists && doc.data().items) STATE.menuCategories = doc.data().items.filter(c=>c.visible!==false);
    else STATE.menuCategories = SEED_CATEGORIES;
  }).catch(()=>{ STATE.menuCategories = SEED_CATEGORIES; });

  fbDb.collection('config').doc('menu_items').get().then(doc => {
    if (doc.exists && doc.data().items) STATE.menuItems = doc.data().items;
    else STATE.menuItems = SEED_ITEMS;
  }).catch(()=>{ STATE.menuItems = SEED_ITEMS; });

  // Listen for messages from server to this table
  fbDb.collection('messages').onSnapshot(snap => {
    STATE.messages = [];
    snap.forEach(d => STATE.messages.push({id:d.id,...d.data()}));
    showLatestMessage();
  });
}
function useSeedData() { STATE.menuCategories = SEED_CATEGORIES; STATE.menuItems = SEED_ITEMS; }

// ─── Setup ──────────────────────────────────────────────────────
function setLang(lang, el) {
  STATE.lang = lang;
  document.querySelectorAll('.lang-card').forEach(c=>c.classList.remove('selected'));
  if (el) el.classList.add('selected');
}

function openMenu() {
  var sel = document.getElementById('setup-table');
  if (sel.value) STATE.tableNum = parseInt(sel.value);
  document.getElementById('menu-table-badge').textContent = 'Table '+STATE.tableNum;
  showScreen('menu');
  renderMenuTabs();
}

// ─── Menu rendering ─────────────────────────────────────────────
var currentMenuCat = null;

function renderMenuTabs() {
  var tabs = document.getElementById('menu-tabs');
  var cats = STATE.menuCategories.length ? STATE.menuCategories : SEED_CATEGORIES;
  tabs.innerHTML = cats.map((c,i) =>
    '<div class="menu-tab'+(i===0?' active':'')+'" data-cat="'+c.id+'" onclick="selectMenuCat(\''+c.id+'\')">'+c.name+'</div>'
  ).join('');
  currentMenuCat = cats[0].id;
  renderMenuContent();
}

function selectMenuCat(catId) {
  currentMenuCat = catId;
  document.querySelectorAll('.menu-tab').forEach(t => t.classList.toggle('active', t.dataset.cat===catId));
  renderMenuContent();
}

function renderMenuContent() {
  var items = (STATE.menuItems.length ? STATE.menuItems : SEED_ITEMS).filter(i => i.category===currentMenuCat);
  var c = document.getElementById('menu-content');
  if (!items.length) { c.innerHTML='<p style="text-align:center;color:var(--text-muted);padding:3rem;">No items in this category yet.</p>'; return; }
  c.innerHTML = '<div class="menu-grid">'+items.map(item => {
    var tags = (item.dietary||[]).slice(0,3).map(d=>'<span class="dish-tag">'+d+'</span>').join('');
    var allergenTags = (item.allergens||[]).map(a=>'<span class="dish-tag allergen">'+a+'</span>').join('');
    return '<div class="dish-card" onclick="openDish(\''+item.id+'\')">'+
      '<div class="dish-name">'+item.name+'</div>'+
      '<div class="dish-desc">'+item.desc+'</div>'+
      '<div class="dish-meta">'+
        '<span class="dish-price">$'+item.price.toFixed(2)+'</span>'+
        '<div class="dish-tags">'+tags+allergenTags+'</div>'+
      '</div>'+
    '</div>';
  }).join('')+'</div>';
}

function switchLang(lang) {
  STATE.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang===lang));
  renderMenuContent();
}

// ─── Dish detail ────────────────────────────────────────────────
function openDish(itemId) {
  var item = (STATE.menuItems.length?STATE.menuItems:SEED_ITEMS).find(i=>i.id===itemId);
  if (!item) return;
  var modal = document.getElementById('dish-modal');
  var content = document.getElementById('dish-modal-content');
  var mods = (item.modifiers||[]).map(m =>
    '<div class="modifier-group"><h4>'+m.group+'</h4>'+
    m.options.map(o=>'<label class="modifier-option"><input type="radio" name="mod-'+m.group+'" value="'+o+'"> '+o+'</label>').join('')+
    '</div>'
  ).join('');
  var allergens = (item.allergens||[]).length ? '<p style="margin-top:0.8rem;"><strong style="color:var(--wine-red);">⚠ Allergens:</strong> '+(item.allergens||[]).join(', ')+'</p>' : '';
  var dietary = (item.dietary||[]).length ? '<p style="margin-top:0.4rem;color:var(--sage);font-size:0.85rem;">'+item.dietary.join(' · ')+'</p>' : '';
  content.innerHTML = '<button style="position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-muted);" onclick="closeDishModal()">×</button>'+
    '<h2>'+item.name+'</h2>'+
    '<p style="color:var(--text-secondary);margin-bottom:0.5rem;">'+item.desc+'</p>'+
    '<p style="font-size:1.2rem;font-weight:600;color:var(--copper);">$'+item.price.toFixed(2)+'</p>'+
    allergens+dietary+
    '<p style="margin-top:0.8rem;font-size:0.8rem;color:var(--text-muted);">⏱ '+item.cookTime+' min · Station: '+item.station+'</p>'+
    mods;
  modal.classList.add('open');
}
function closeDishModal() { document.getElementById('dish-modal').classList.remove('open'); }

// ─── Call Server ────────────────────────────────────────────────
function callServer() {
  var call = { table:STATE.tableNum, time:Date.now(), status:'active' };
  if (fbReady) fbDb.collection('calls').add(call);
  toast('🔔 Server has been called!');
}

// ─── Messages from server ───────────────────────────────────────
function showLatestMessage() {
  var msgs = STATE.messages.filter(m=>m.table===STATE.tableNum&&m.from==='server').sort((a,b)=>b.time-a.time);
  var area = document.getElementById('menu-msg-area');
  if (area && msgs.length) area.innerHTML='💬 '+msgs[0].text;
  // Show notification popup for recent messages (within 10s)
  if (msgs.length && Date.now()-msgs[0].time < 10000) {
    var notif = document.getElementById('msg-notification');
    notif.textContent = '💬 '+msgs[0].text;
    notif.classList.add('show');
    setTimeout(()=>notif.classList.remove('show'), 5000);
  }
}

// ─── Init ───────────────────────────────────────────────────────
function init() {
  var sel = document.getElementById('setup-table');
  for (var i=1;i<=50;i++) sel.innerHTML+='<option value="'+i+'">Table '+i+'</option>';
  loadFromFirebase();
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
